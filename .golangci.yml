version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    staticcheck:
      # v1 enabled only the gosimple (S1xxx) checks via the `gosimple` linter,
      # which v2 folds into `staticcheck`. Restrict to S1* to preserve the
      # previous behavior; adopting the SA/ST/QF checks is a separate change.
      checks:
        - S1*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - unused
        text: getConfiguration
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
